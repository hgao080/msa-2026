services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend/Horme.API
      target: dev
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=Horme;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: horme-api
      Jwt__Audience: horme-client
      Jwt__ExpiryMinutes: "1440"
      Frontend__Url: http://localhost:3000
      DOTNET_USE_POLLING_FILE_WATCHER: "true"
    volumes:
      - ./backend/Horme.API:/src
      - api-obj:/src/obj
      - api-bin:/src/bin
    ports:
      - "5210:8080"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      target: dev
    environment:
      HORME_API_URL: http://api:8080
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  mssql-data:
  api-obj:
  api-bin:
